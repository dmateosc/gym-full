services:
  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile
      target: frontend-production
    container_name: gymapp-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - gymapp-network
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile
      target: backend-production
    container_name: gymapp-backend
    ports:
      - "3001:3001"
    restart: unless-stopped
    env_file: apps/backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - gymapp-network
      - db-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  gymapp-network:
    driver: bridge
  # Red externa donde vive el contenedor de PostgreSQL
  # Crear con: docker network create db-network
  db-network:
    external: true
