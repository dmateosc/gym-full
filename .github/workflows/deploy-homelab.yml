name: Deploy — gym.3dmc.lab (staging)

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

permissions:
  pull-requests: write

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
            backend:
              - 'apps/backend/**'

  deploy:
    name: Deploy to gym.3dmc.lab
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - name: Checkout branch
        run: |
          cd /opt/gym-full
          git fetch origin
          BRANCH="${{ github.head_ref || inputs.branch || github.ref_name }}"
          git checkout "$BRANCH"
          git pull origin "$BRANCH"

      - name: Rebuild containers (selective)
        run: |
          cd /opt/stacks/gym-full
          CHANGED_FRONTEND="${{ needs.changes.outputs.frontend }}"
          CHANGED_BACKEND="${{ needs.changes.outputs.backend }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — rebuilding all"
            docker compose up --build -d
          elif [ "$CHANGED_FRONTEND" = "true" ] && [ "$CHANGED_BACKEND" = "true" ]; then
            echo "Frontend + backend changed — rebuilding all"
            docker compose up --build -d
          elif [ "$CHANGED_FRONTEND" = "true" ]; then
            echo "Only frontend changed"
            docker compose up --build -d frontend
          elif [ "$CHANGED_BACKEND" = "true" ]; then
            echo "Only backend changed"
            docker compose up --build -d backend
          fi

      - name: Wait for backend health
        if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect gymapp-backend --format='{{.State.Health.Status}}' 2>/dev/null || echo "starting")
            if [ "$status" = "healthy" ]; then
              echo "Backend healthy"
              exit 0
            fi
            echo "Waiting... ($status)"
            sleep 10
          done
          echo "Health check failed — last logs:"
          docker logs gymapp-backend --tail 30
          exit 1

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const changedFrontend = '${{ needs.changes.outputs.frontend }}' === 'true';
            const changedBackend = '${{ needs.changes.outputs.backend }}' === 'true';
            const parts = [];
            if (changedFrontend) parts.push('frontend');
            if (changedBackend) parts.push('backend');
            const what = parts.length ? `(${parts.join(' + ')})` : '';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview ${what} desplegado en **https://gym.3dmc.lab** (red local)`
            })
