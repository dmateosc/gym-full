name: Preview — gym.3dmc.lab

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy as preview'
        required: true
        default: 'main'

jobs:
  deploy-preview:
    name: Deploy PR to gym.3dmc.lab
    runs-on: self-hosted
    steps:
      - name: Checkout PR branch
        run: |
          cd /opt/gym-full
          git fetch origin
          BRANCH=${{ github.head_ref || inputs.branch }}
          git checkout $BRANCH
          git pull origin $BRANCH

      - name: Rebuild and restart preview containers
        run: |
          cd /opt/gym-full
          docker compose up --build -d

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect gymapp-backend --format='{{.State.Health.Status}}' 2>/dev/null || echo "starting")
            if [ "$status" = "healthy" ]; then
              echo "Backend healthy"
              exit 0
            fi
            echo "Waiting... ($status)"
            sleep 10
          done
          echo "Health check failed — last logs:"
          docker logs gymapp-backend --tail 30
          exit 1

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Preview desplegado en **https://gym.3dmc.lab** (red local)'
            })
