name: Preview — gym.3dmc.lab

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  deploy-preview:
    name: Deploy PR to gym.3dmc.lab
    runs-on: self-hosted
    steps:
      - name: Checkout PR branch
        run: |
          cd /opt/gym-full
          git fetch origin
          git checkout ${{ github.head_ref }}
          git pull origin ${{ github.head_ref }}

      - name: Rebuild and restart preview containers
        run: |
          cd /opt/stacks/gym-full
          docker compose up --build -d

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect gymapp-backend --format='{{.State.Health.Status}}' 2>/dev/null)
            if [ "$status" = "healthy" ]; then
              echo "Backend healthy"
              exit 0
            fi
            echo "Waiting... ($status)"
            sleep 10
          done
          docker logs gymapp-backend --tail 20
          exit 1

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Preview desplegado en **https://gym.3dmc.lab** (red local)'
            })
