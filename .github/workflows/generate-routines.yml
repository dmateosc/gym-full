name: 'Generate Daily Gym Routine'

on:
  schedule:
    - cron: '0 6 * * 1-6'  # Mon–Sat at 06:00 UTC (skip Sunday)
  workflow_dispatch:
    inputs:
      date:
        description: 'Fecha (YYYY-MM-DD). Vacío = hoy'
        required: false
        default: ''

jobs:
  generate-routine:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/generate-routine/package.json

      - name: Install dependencies
        working-directory: scripts/generate-routine
        run: npm ci

      - name: Run generate-routine script
        working-directory: scripts/generate-routine
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_SSL: ${{ secrets.DATABASE_SSL }}
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(date +%Y-%m-%d)
          fi
          echo "date=$DATE" >> $GITHUB_OUTPUT
          npx ts-node index.ts "$DATE" 2>&1 | tee /tmp/routine-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Write step summary
        if: always()
        run: |
          {
            echo "## Generación de Rutina Diaria"
            echo ""
            echo "- **Fecha de ejecución**: $(date -u)"
            echo "- **Trigger**: ${{ github.event_name }}"
            echo ""
            echo "### Output"
            echo '```'
            cat /tmp/routine-output.txt 2>/dev/null || echo "(no output)"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
